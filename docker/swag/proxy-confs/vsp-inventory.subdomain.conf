# Reverse proxy rules for the VSP Inventory Manager app.
# Mounted read-only into the swag container at /config/nginx/proxy-confs/.
# Requires the "backend" and "frontend" containers to be on the same docker network as swag.

server {
    listen 80;
    listen [::]:80;
    server_name inventory.indiconvision.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;

    server_name inventory.indiconvision.com;

    include /config/nginx/ssl.conf;

    client_max_body_size 20M;

    location /api/ {
        include /config/nginx/proxy.conf;
        include /config/nginx/resolver.conf;
        set $upstream_app backend;
        set $upstream_port 4000;
        set $upstream_proto http;
        proxy_pass $upstream_proto://$upstream_app:$upstream_port/api/;
    }

    location / {
        include /config/nginx/proxy.conf;
        include /config/nginx/resolver.conf;
        set $upstream_app frontend;
        set $upstream_port 80;
        set $upstream_proto http;
        proxy_pass $upstream_proto://$upstream_app:$upstream_port;
    }
}
