server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 20M;

    # This container sits behind an external reverse proxy (e.g. Nginx Proxy Manager) that
    # terminates TLS and is expected to set X-Forwarded-Proto correctly - pass that through
    # rather than assuming a scheme, since this port may also be reached directly (e.g. for
    # local debugging) where it should NOT be treated as secure.
    location /api/ {
        proxy_pass http://backend:4000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }

    location / {
        try_files $uri /index.html;
    }
}
