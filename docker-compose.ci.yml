# CI-only override: temporarily publishes backend/frontend ports so the smoke test can hit them
# directly over plain HTTP, bypassing cloudflared (which needs a real Cloudflare tunnel token and
# a live domain and is therefore not exercised in CI - see docker/cloudflared/README.md).
services:
  backend:
    ports:
      - "4000:4000"
    environment:
      # The app hardcodes secure (HTTPS-only) session cookies in production, correctly relying
      # on X-Forwarded-Proto from the frontend container's nginx (which always claims "https"
      # since it's only ever reached via the tunnel - see docker/frontend/nginx.conf). CI hits
      # things over plain HTTP with no tunnel in front at all, so relax that just for this
      # smoke test or the login cookie would never be sent back.
      NODE_ENV: test
  frontend:
    ports:
      - "8081:80"
