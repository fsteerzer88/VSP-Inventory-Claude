# CI-only override: publishes backend's port too (frontend's port is already published by the
# base compose file, driven by HTTP_PORT in the CI .env) so the smoke test can hit things
# directly over plain HTTP, and relaxes the secure-cookie requirement since there's no reverse
# proxy terminating HTTPS in front in CI.
services:
  backend:
    ports:
      - "4000:4000"
    environment:
      # The app hardcodes secure (HTTPS-only) session cookies in production, relying on
      # X-Forwarded-Proto being forwarded correctly by whatever reverse proxy sits in front
      # (see docker/frontend/nginx.conf). CI has no such proxy, so relax that just for this
      # smoke test or the login cookie would never be sent back.
      NODE_ENV: test
