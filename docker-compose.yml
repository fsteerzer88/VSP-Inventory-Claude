services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vsp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-vsp_inventory}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vsp}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - app-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-vsp}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-vsp_inventory}
      SESSION_SECRET: ${SESSION_SECRET:?SESSION_SECRET is required}
      PORT: 4000
      NODE_ENV: production
      IMAGES_DIR: /data/images
      CORS_ORIGIN: https://${APP_HOSTNAME:-inventory.lan}
      PUBLIC_BASE_URL: https://${APP_HOSTNAME:-inventory.lan}
      SEED_ADMIN_USERNAME: ${SEED_ADMIN_USERNAME:-admin}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-changeme}
    volumes:
      - product_images:/data/images
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network

  reverse-proxy:
    build:
      context: .
      dockerfile: docker/reverse-proxy/Dockerfile
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./docker/reverse-proxy/certs:/etc/nginx/certs
    depends_on:
      - backend
    networks:
      - app-network

volumes:
  postgres_data:
  product_images:

networks:
  app-network:
